<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Social Edition</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; --heart: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Navigation */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 600; color: #64748b; transition: 0.2s; }
        .active { background: var(--primary) !important; color: white !important; }

        /* Main Content */
        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; max-width: 900px; margin: 0 auto; }
        .active-page { display: block; }

        /* Cards & Social */
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .card-media { width: 100%; min-height: 300px; background-color: #f1f5f9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-media img, .card-media video { max-width: 100%; max-height: 500px; }
        .card-content { padding: 15px; }
        .actions { display: flex; gap: 15px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; gap: 5px; color: #64748b; }
        .liked { color: var(--heart); }

        /* Comments */
        .comment-sec { background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; }
        .comment-input { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 20px; margin-top: 5px; outline: none; }

        /* Profile */
        #pfp-circle { width: 110px; height: 110px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 15px; background-size: cover; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .follow-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--primary); color: var(--primary); background: white; cursor: pointer; font-weight: 600; }
        .following { background: var(--primary); color: white; }

        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="logo">Art Hub</div>
        <input type="text" id="u-in" placeholder="Username">
        <input type="password" id="p-in" placeholder="Password">
        <button class="btn" onclick="login()">Join Hub</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" id="nav-home" onclick="showTab('home', this)">Home</div>
    <div class="nav-item" onclick="showTab('groups', this)">Groups</div>
    <div class="nav-item" onclick="showTab('learn', this)">Learn</div>
    <div class="nav-item" onclick="showTab('profile', this)">Profile</div>
    <div style="margin-top:auto; padding:10px; font-size:0.6rem; color:#94a3b8; cursor:pointer;" onclick="factoryReset()">Clear Storage Fix</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Community</h2>
            <button class="btn" style="width:auto" onclick="document.getElementById('art-up').click()">Post Art</button>
        </div>
        <input type="file" id="art-up" hidden accept="image/*" onchange="handleFile(this, 'art')">
        <div id="home-feed"></div>
    </section>

    <section id="groups" class="page">
        <h2>Studios</h2>
        <button class="btn" style="width:auto; margin-bottom:20px;" onclick="createGroup()">+ Create New Group</button>
        <div id="group-list" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </section>

    <section id="learn" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Tutorials</h2>
            <button class="btn" style="width:auto" onclick="document.getElementById('vid-up').click()">Upload Video</button>
        </div>
        <input type="file" id="vid-up" hidden accept="video/*" onchange="handleFile(this, 'video')">
        <div id="learn-feed"></div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; border:1px solid #e2e8f0;">
            <div id="pfp-circle" onclick="document.getElementById('pfp-up').click()">👤</div>
            <input type="file" id="pfp-up" hidden accept="image/*" onchange="handleFile(this, 'pfp')">
            <h2 id="prof-user">Artist</h2>
            <p id="prof-bio">Digital Creator</p>
            <div id="prof-stats" style="margin-bottom:15px; font-size:0.9rem; color:#64748b;">0 Followers • 0 Following</div>
            <button class="btn" style="background:#f1f5f9; color:black; width:auto" onclick="editBio()">Edit Profile</button>
        </div>
        <h3 style="margin-top:30px;">My Gallery</h3>
        <div id="my-gallery"></div>
    </section>
</main>

<script>
    let activeUser = localStorage.getItem('art_user');
    let db = JSON.parse(localStorage.getItem('art_db_social')) || { users: {}, posts: [], groups: [], follows: {} };

    window.onload = () => {
        if(activeUser) {
            document.getElementById('auth-overlay').style.display='none';
            render();
        }
        showTab('home', document.getElementById('nav-home'));
    };

    function login() {
        const u = document.getElementById('u-in').value.trim();
        const p = document.getElementById('p-in').value.trim();
        if(!u || !p) return;
        if(!db.users[u]) db.users[u] = { pass:p, bio:"New Artist", pfp:"", followers:0, following:0 };
        activeUser = u;
        localStorage.setItem('art_user', u);
        document.getElementById('auth-overlay').style.display = 'none';
        save(); render();
    }

    // --- FILE HANDLER WITH EXTREME COMPRESSION ---
    function handleFile(input, type) {
        const file = input.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            if(type === 'video') {
                // For videos, we use a slightly lower quality for storage
                db.posts.unshift({ type:'video', src: e.target.result, author: activeUser, likes:[], comments:[], id: Date.now() });
                save(); render();
            } else {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = type === 'pfp' ? 120 : 500;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } }
                    else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const compressed = canvas.toDataURL('image/jpeg', 0.5);

                    if(type === 'pfp') db.users[activeUser].pfp = compressed;
                    else db.posts.unshift({ type:'art', src: compressed, author: activeUser, likes:[], comments:[], id: Date.now() });
                    save(); render();
                };
            }
        };
        reader.readAsDataURL(file);
    }

    function render() {
        if(!activeUser) return;
        document.getElementById('prof-user').innerText = activeUser;
        document.getElementById('prof-bio').innerText = db.users[activeUser].bio;
        document.getElementById('prof-stats').innerText = `${db.users[activeUser].followers || 0} Followers • ${db.users[activeUser].following || 0} Following`;
        if(db.users[activeUser].pfp) {
            document.getElementById('pfp-circle').style.backgroundImage = `url(${db.users[activeUser].pfp})`;
            document.getElementById('pfp-circle').innerText = "";
        }

        const hFeed = document.getElementById('home-feed');
        const lFeed = document.getElementById('learn-feed');
        const mGal = document.getElementById('my-gallery');
        const gList = document.getElementById('group-list');

        hFeed.innerHTML = lFeed.innerHTML = mGal.innerHTML = gList.innerHTML = '';

        db.posts.forEach((p, idx) => {
            const isLiked = p.likes.includes(activeUser);
            const html = `
                <div class="card">
                    <div style="padding:12px; display:flex; justify-content:space-between; align-items:center;">
                        <b>@${p.author}</b>
                        ${p.author !== activeUser ? `<button class="follow-btn ${isFollowing(p.author)?'following':''}" onclick="toggleFollow('${p.author}')">${isFollowing(p.author)?'Following':'Follow'}</button>` : ''}
                    </div>
                    <div class="card-media">
                        ${p.type === 'video' ? `<video src="${p.src}" controls></video>` : `<img src="${p.src}">`}
                    </div>
                    <div class="card-content">
                        <div class="actions">
                            <button class="action-btn ${isLiked?'liked':''}" onclick="toggleLike(${idx})">❤️ ${p.likes.length}</button>
                            <button class="action-btn">💬 ${p.comments.length}</button>
                        </div>
                        <div class="comment-sec">
                            ${p.comments.map(c => `<div><b>${c.u}:</b> ${c.t}</div>`).join('')}
                            <input type="text" class="comment-input" placeholder="Add comment..." onkeydown="if(event.key==='Enter') addComment(${idx}, this.value)">
                        </div>
                    </div>
                </div>`;
            
            if(p.type === 'art') hFeed.innerHTML += html;
            else lFeed.innerHTML += html;
            if(p.author === activeUser) mGal.innerHTML += html;
        });

        db.groups.forEach(g => {
            gList.innerHTML += `<div class="card" style="padding:20px; background:var(--primary); color:white; margin:0;"><h3>${g.name}</h3><p>Code: ${g.code}</p></div>`;
        });
    }

    // --- SOCIAL LOGIC ---
    function toggleLike(idx) {
        const p = db.posts[idx];
        if(p.likes.includes(activeUser)) p.likes = p.likes.filter(u => u !== activeUser);
        else p.likes.push(activeUser);
        save(); render();
    }

    function addComment(idx, text) {
        if(!text) return;
        db.posts[idx].comments.push({ u: activeUser, t: text });
        save(); render();
    }

    function isFollowing(target) {
        if(!db.follows[activeUser]) return false;
        return db.follows[activeUser].includes(target);
    }

    function toggleFollow(target) {
        if(!db.follows[activeUser]) db.follows[activeUser] = [];
        if(isFollowing(target)) {
            db.follows[activeUser] = db.follows[activeUser].filter(u => u !== target);
            db.users[target].followers--;
            db.users[activeUser].following--;
        } else {
            db.follows[activeUser].push(target);
            db.users[target].followers = (db.users[target].followers || 0) + 1;
            db.users[activeUser].following = (db.users[activeUser].following || 0) + 1;
        }
        save(); render();
    }

    // --- GROUPS & PROFILE ---
    function createGroup() {
        const n = prompt("Studio Name:");
        if(n) {
            db.groups.push({ name: n, code: Math.floor(1000 + Math.random() * 9000) });
            save(); render();
        }
    }

    function editBio() {
        const b = prompt("Bio:", db.users[activeUser].bio);
        if(b) { db.users[activeUser].bio = b; save(); render(); }
    }

    function save() { 
        try { localStorage.setItem('art_db_social', JSON.stringify(db)); }
        catch(e) { alert("Space full! Click 'Clear Storage Fix' in sidebar."); }
    }
    
    function factoryReset() { if(confirm("Clear storage? This fixes the buttons!")) { localStorage.clear(); location.reload(); } }

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }
</script>
</body>
</html>
