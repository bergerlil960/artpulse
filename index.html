<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art | Community & Creation</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; --accent: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* AUTH OVERLAY */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }

        /* Navigation */
        nav { width: 240px; height: 100vh; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; letter-spacing: -1.5px; }
        .nav-item { padding: 12px 15px; margin: 4px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; font-weight: 500; }
        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .active-nav { background: var(--primary) !important; color: white !important; }

        /* Main Content */
        main { margin-left: 240px; padding: 40px; width: calc(100% - 240px); box-sizing: border-box; }
        .page { display: none; max-width: 1000px; margin: 0 auto; }
        .active-page { display: block; }

        /* Profile Styles */
        .profile-container { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        #pfp { width: 130px; height: 130px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 20px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .edit-mode .view-item { display: none; }
        .edit-mode .edit-item { display: block; }
        .edit-item { display: none; margin: 10px auto; width: 100%; max-width: 400px; }

        /* Art Cards */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .art-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .art-img { height: 260px; background-size: cover; background-position: center; border-bottom: 1px solid #f1f5f9; }
        .card-content { padding: 15px; }

        /* Buttons */
        .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        .btn-save { background: var(--accent); margin-top: 15px; }
        
        #save-status { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 8px 15px; border-radius: 5px; display: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="save-status">Saving...</div>

<div id="auth-overlay">
    <div class="auth-card">
        <h1>Art</h1>
        <input type="text" id="auth-user" class="auth-input" placeholder="Username">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
        <button class="btn" style="width:100%" onclick="handleLogin()">Login / Join</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active-nav" onclick="showPage('home', this)">Home</div>
    <div class="nav-item" onclick="showPage('groups', this)">Groups</div>
    <div class="nav-item" onclick="showPage('profile', this)">Profile</div>
    <div class="nav-item" style="color:#ef4444; margin-top:auto;" onclick="logout()">Log Out</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; gap:10px; margin-bottom:30px;">
            <input type="text" id="search" placeholder="Search artists..." class="auth-input" onkeyup="renderAll()">
            <button class="btn" onclick="document.getElementById('artUpload').click()">Upload Art</button>
            <input type="file" id="artUpload" hidden accept="image/*" onchange="processArt(this)">
        </div>
        <div class="art-grid" id="global-feed"></div>
    </section>

    <section id="profile" class="page">
        <div class="profile-container" id="profile-card">
            <div id="pfp" onclick="document.getElementById('pfpUpload').click()">👤</div>
            <input type="file" id="pfpUpload" hidden onchange="processPfp(this)">
            
            <h2 class="view-item" id="display-name">Artist</h2>
            <p class="view-item" id="display-bio">Digital Creator</p>
            
            <input type="text" id="edit-name" class="edit-item auth-input" placeholder="Name">
            <textarea id="edit-bio" class="edit-item auth-input" placeholder="Bio"></textarea>
            
            <button class="btn view-item" onclick="enterEditMode()">Edit Profile</button>
            <button class="btn btn-save edit-item" onclick="confirmProfileSave()">Save Changes</button>
        </div>
        <h3 style="margin-top:40px;">My Gallery</h3>
        <div class="art-grid" id="user-gallery"></div>
    </section>

    <section id="groups" class="page">
        <div style="background:white; padding:25px; border-radius:20px; border:1px solid #eee; margin-bottom:20px;">
            <h3>Studios</h3>
            <input type="text" id="group-name-in" placeholder="Studio Name (to create)" class="auth-input">
            <input type="text" id="group-code-in" placeholder="4-Digit Code" maxlength="4" class="auth-input">
            <button class="btn" onclick="handleGroupAction()">Enter</button>
        </div>
        <div id="chat-window" style="display:none; background:white; padding:20px; border-radius:15px; border:1px solid #eee;">
            <h2 id="studio-title">Studio</h2>
            <div id="chat-box" style="height:250px; overflow-y:auto; background:#f9f9f9; padding:15px; margin-bottom:10px; border-radius:10px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Message..." class="auth-input">
                <button class="btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </section>
</main>

<script>
    let activeUser = localStorage.getItem('art_session_user');
    let artDB = JSON.parse(localStorage.getItem('art_storage_db')) || { users: {}, items: [], clusters: {} };

    window.onload = () => {
        if(activeUser) {
            document.getElementById('auth-overlay').style.display = 'none';
            refreshProfileUI();
        }
        renderAll();
    };

    function handleLogin() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Fill fields");

        if(!artDB.users[u]) {
            artDB.users[u] = { pass: p, bio: "Digital Creator", pfp: "", name: u };
        } else if(artDB.users[u].pass !== p) {
            return alert("Wrong password");
        }

        activeUser = u;
        localStorage.setItem('art_session_user', u);
        commitToDisk();
        document.getElementById('auth-overlay').style.display = 'none';
        refreshProfileUI();
        renderAll();
    }

    function commitToDisk() {
        try {
            localStorage.setItem('art_storage_db', JSON.stringify(artDB));
            const status = document.getElementById('save-status');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 1000);
        } catch(e) {
            alert("Storage full! Try uploading smaller images.");
        }
    }

    function refreshProfileUI() {
        const data = artDB.users[activeUser];
        document.getElementById('display-name').innerText = data.name || activeUser;
        document.getElementById('display-bio').innerText = data.bio;
        if(data.pfp) {
            document.getElementById('pfp').style.backgroundImage = `url(${data.pfp})`;
            document.getElementById('pfp').innerText = "";
        }
    }

    function enterEditMode() {
        document.getElementById('profile-card').classList.add('edit-mode');
        document.getElementById('edit-name').value = artDB.users[activeUser].name || activeUser;
        document.getElementById('edit-bio').value = artDB.users[activeUser].bio;
    }

    function confirmProfileSave() {
        artDB.users[activeUser].name = document.getElementById('edit-name').value;
        artDB.users[activeUser].bio = document.getElementById('edit-bio').value;
        commitToDisk();
        refreshProfileUI();
        document.getElementById('profile-card').classList.remove('edit-mode');
    }

    function processArt(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                artDB.items.push({ 
                    src: e.target.result, 
                    owner: activeUser, 
                    ownerName: artDB.users[activeUser].name || activeUser,
                    hearts: 0,
                    talk: []
                });
                commitToDisk();
                renderAll();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function processPfp(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                artDB.users[activeUser].pfp = e.target.result;
                commitToDisk();
                refreshProfileUI();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function renderAll() {
        const feed = document.getElementById('global-feed');
        const gal = document.getElementById('user-gallery');
        const q = document.getElementById('search').value.toLowerCase();
        feed.innerHTML = ''; gal.innerHTML = '';

        artDB.items.forEach((item, idx) => {
            if(item.ownerName.toLowerCase().includes(q)) {
                const chatHtml = item.talk.map(t => `<div><b>${t.u}:</b> ${t.m}</div>`).join('');
                const card = `
                <div class="art-card">
                    <div class="art-img" style="background-image:url(${item.src})"></div>
                    <div class="card-content">
                        <strong>@${item.ownerName}</strong>
                        <div style="margin:10px 0">
                            <button class="btn" style="padding:5px 10px" onclick="addHeart(${idx})">❤️ ${item.hearts}</button>
                        </div>
                        <div style="font-size:0.8rem; background:#f4f4f4; padding:8px; border-radius:8px;">
                            ${chatHtml || 'No comments'}
                        </div>
                        <div style="display:flex; margin-top:10px">
                            <input type="text" id="comm-${idx}" placeholder="Talk..." style="flex:1; border:1px solid #ddd; border-radius:5px;">
                            <button onclick="postTalk(${idx})" style="background:none; border:none; color:blue; cursor:pointer;">Post</button>
                        </div>
                    </div>
                </div>`;
                feed.innerHTML += card;
                if(item.owner === activeUser) gal.innerHTML += card;
            }
        });
    }

    function addHeart(i) { artDB.items[i].hearts++; commitToDisk(); renderAll(); }
    
    function postTalk(i) {
        const m = document.getElementById(`comm-${i}`).value;
        if(!m) return;
        artDB.items[i].talk.push({ u: artDB.users[activeUser].name || activeUser, m: m });
        commitToDisk(); renderAll();
    }

    function handleGroupAction() {
        const c = document.getElementById('group-code-in').value.trim();
        const n = document.getElementById('group-name-in').value.trim();
        if(!c) return alert("Code needed");
        if(!artDB.clusters[c] && n) artDB.clusters[c] = { name: n, logs: [] };
        if(artDB.clusters[c]) {
            document.getElementById('studio-title').innerText = artDB.clusters[c].name;
            document.getElementById('chat-window').style.display = 'block';
            refreshChat(c);
        } else { alert("Studio not found"); }
    }

    function refreshChat(c) {
        const b = document.getElementById('chat-box');
        b.innerHTML = artDB.clusters[c].logs.map(l => `<p><b>${l.u}:</b> ${l.m}</p>`).join('');
        b.scrollTop = b.scrollHeight;
    }

    function sendMessage() {
        const c = document.getElementById('group-code-in').value;
        const m = document.getElementById('chat-input').value;
        if(!m) return;
        artDB.clusters[c].logs.push({ u: artDB.users[activeUser].name || activeUser, m: m });
        document.getElementById('chat-input').value = '';
        commitToDisk(); refreshChat(c);
    }

    function logout() { localStorage.removeItem('art_session_user'); location.reload(); }
    
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active-nav');
    }
</script>
</body>
</html>
