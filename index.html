<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art | Global Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- AUTH SCREEN --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 12px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }

        /* --- SIDEBAR NAV --- */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 500; }
        .active { background: var(--primary) !important; color: white !important; }

        /* --- CONTENT --- */
        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; }
        .active-page { display: block; }

        /* --- PFP DESIGN --- */
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; }
        #pfp-display { width: 100%; height: 100%; background: #e2e8f0; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden; }
        .pfp-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 50%; opacity: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; transition: 0.3s; }
        .pfp-container:hover .pfp-overlay { opacity: 1; }

        /* --- ART GRID --- */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-img { height: 250px; background-size: cover; background-position: center; }
        .card-info { padding: 15px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1>Art Hub</h1>
        <input type="text" id="user-in" class="auth-input" placeholder="Username">
        <input type="password" id="pass-in" class="auth-input" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Sign In / Join</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" onclick="show('home', this)">Home</div>
    <div class="nav-item" onclick="show('profile', this)">Profile</div>
    <div class="nav-item" style="color:#ef4444; margin-top:auto" onclick="location.reload()">Logout</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="margin-bottom:30px;">
            <button class="btn" style="width:auto" onclick="document.getElementById('artFile').click()">+ Share Artwork</button>
            <input type="file" id="artFile" hidden accept="image/*" onchange="uploadArt(this)">
        </div>
        <div class="art-grid" id="global-feed"></div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center; margin-bottom:30px;">
            <div class="pfp-container" onclick="document.getElementById('pfpFile').click()">
                <div id="pfp-display">👤</div>
                <div class="pfp-overlay">📷 Change</div>
            </div>
            <input type="file" id="pfpFile" hidden accept="image/*" onchange="uploadPfp(this)">
            <h2 id="profile-name">Artist</h2>
            <p id="profile-bio">Digital Creator</p>
        </div>
        <h3>My Showcase</h3>
        <div class="art-grid" id="user-gallery"></div>
    </section>
</main>

<script>
    // --- STEP 1: Paste your Firebase config here to make it live for everyone ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentUser = "";

    function handleAuth() {
        const u = document.getElementById('user-in').value.trim();
        const p = document.getElementById('pass-in').value.trim();
        if(!u || !p) return alert("Fill all fields");
        
        currentUser = u;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('profile-name').innerText = u;
        
        // Start listening to the cloud database
        listenToCloud();
    }

    function uploadArt(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            // This pushes the art to the CLOUD so everyone sees it
            database.ref('global_posts').push({
                img: e.target.result,
                author: currentUser,
                timestamp: Date.now()
            });
        };
        reader.readAsDataURL(input.files[0]);
    }

    function uploadPfp(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            // This saves your PFP to the cloud under your username
            database.ref('users/' + currentUser).update({ pfp: e.target.result });
        };
        reader.readAsDataURL(input.files[0]);
    }

    function listenToCloud() {
        // Update Home Feed
        database.ref('global_posts').on('value', (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('global-feed');
            const gallery = document.getElementById('user-gallery');
            feed.innerHTML = gallery.innerHTML = "";
            
            if (data) {
                const posts = Object.values(data).reverse();
                posts.forEach(post => {
                    const card = `
                    <div class="card">
                        <div class="card-img" style="background-image:url(${post.img})"></div>
                        <div class="card-info"><strong>@${post.author}</strong></div>
                    </div>`;
                    feed.innerHTML += card;
                    if(post.author === currentUser) gallery.innerHTML += card;
                });
            }
        });

        // Update PFP
        database.ref('users/' + currentUser).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data && data.pfp) {
                document.getElementById('pfp-display').style.backgroundImage = `url(${data.pfp})`;
                document.getElementById('pfp-display').innerText = "";
            }
        });
    }

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }
</script>
</body>
</html>
