<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Stable Version</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); }
        
        /* Sidebar */
        nav { width: 200px; background: white; border-right: 1px solid #ddd; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .nav-link { padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 5px; display: block; text-decoration: none; color: inherit; }
        .nav-link:hover, .active { background: var(--primary); color: white; }

        /* Main Content */
        main { margin-left: 200px; padding: 30px; width: 100%; }
        .page { display: none; }
        .show { display: block; }

        /* Auth Overlay */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        /* Art & Profile */
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .art-item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .art-img { width: 100%; height: 180px; background-size: cover; background-position: center; }
        #pfp { width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto 10px; background-size: cover; background-position: center; border: 3px solid white; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2>Art Hub</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" style="width:100%" onclick="auth()">Login / Join</button>
    </div>
</div>

<nav>
    <div class="nav-link active" onclick="tab('home', this)">Home</div>
    <div class="nav-link" onclick="tab('groups', this)">Groups</div>
    <div class="nav-link" onclick="tab('profile', this)">Profile</div>
    <div onclick="logout()" style="margin-top:20px; color:red; cursor:pointer; padding:10px;">Logout</div>
</nav>

<main>
    <section id="home" class="page show">
        <button class="btn" onclick="document.getElementById('art-in').click()">+ Upload Art</button>
        <input type="file" id="art-in" hidden accept="image/*" onchange="up(this, 'post')">
        <div id="feed" class="art-grid"></div>
    </section>

    <section id="groups" class="page">
        <h3>Studios</h3>
        <input type="text" id="g-code" placeholder="4-Digit Code" style="width:150px">
        <button class="btn" onclick="join()">Enter Studio</button>
        <div id="chat-area" style="display:none; margin-top:20px;">
            <div id="chat-msgs" style="height:200px; overflow-y:auto; background:white; padding:10px; border:1px solid #ddd;"></div>
            <input type="text" id="msg" placeholder="Message...">
            <button class="btn" onclick="send()">Send</button>
        </div>
    </section>

    <section id="profile" class="page">
        <div style="text-align:center; background:white; padding:20px; border-radius:15px;">
            <div id="pfp" onclick="document.getElementById('pfp-in').click()"></div>
            <input type="file" id="pfp-in" hidden onchange="up(this, 'pfp')">
            <h2 id="p-name">Artist</h2>
            <p id="p-bio"></p>
            <button class="btn" onclick="edit()">Edit Bio</button>
            <br><br>
            <button onclick="wipe()" style="color:red; background:none; border:1px solid red; padding:5px; font-size:10px; cursor:pointer;">Rescue: Wipe Storage</button>
        </div>
        <h3>My Art</h3>
        <div id="my-art" class="art-grid"></div>
    </section>
</main>

<script>
    let cur = localStorage.getItem('art_user');
    let db = JSON.parse(localStorage.getItem('art_db')) || { users: {}, posts: [], groups: {} };

    if(cur) login();

    function auth() {
        let u = document.getElementById('user').value.trim();
        let p = document.getElementById('pass').value.trim();
        if(!u || !p) return;
        if(!db.users[u]) db.users[u] = { pass: p, bio: "Digital Artist", pfp: "" };
        cur = u; localStorage.setItem('art_user', u);
        login();
    }

    function login() {
        document.getElementById('login-screen').style.display = 'none';
        render();
    }

    function up(input, type) {
        let file = input.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = (e) => {
            let img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                let canvas = document.createElement('canvas');
                let max = type === 'pfp' ? 150 : 500; // Force tiny files
                let w = img.width, h = img.height;
                if(w > h) { if(w > max) { h *= max/w; w = max; } }
                else { if(h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                let data = canvas.toDataURL('image/jpeg', 0.5); // 50% quality

                if(type === 'pfp') db.users[cur].pfp = data;
                else db.posts.push({ img: data, author: cur });
                
                try {
                    localStorage.setItem('art_db', JSON.stringify(db));
                    render();
                } catch(err) {
                    alert("Still too much data! Click 'Wipe Storage' in Profile.");
                }
            };
        };
        reader.readAsDataURL(file);
    }

    function render() {
        document.getElementById('p-name').innerText = cur;
        document.getElementById('p-bio').innerText = db.users[cur].bio;
        if(db.users[cur].pfp) document.getElementById('pfp').style.backgroundImage = `url(${db.users[cur].pfp})`;
        
        let f = document.getElementById('feed'), m = document.getElementById('my-art');
        f.innerHTML = m.innerHTML = '';
        db.posts.forEach(p => {
            let item = `<div class="art-item"><div class="art-img" style="background-image:url(${p.img})"></div><div style="padding:10px">@${p.author}</div></div>`;
            f.innerHTML += item;
            if(p.author === cur) m.innerHTML += item;
        });
    }

    function edit() {
        let b = prompt("New Bio:", db.users[cur].bio);
        if(b) { db.users[cur].bio = b; localStorage.setItem('art_db', JSON.stringify(db)); render(); }
    }

    function tab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('show');
        el.classList.add('active');
    }

    function wipe() { if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); } }
    function logout() { localStorage.removeItem('art_user'); location.reload(); }
    
    // Group logic
    let activeG = null;
    function join() {
        let c = document.getElementById('g-code').value;
        if(!c) return;
        if(!db.groups[c]) db.groups[c] = { msgs: [] };
        activeG = c;
        document.getElementById('chat-area').style.display = 'block';
        chat();
    }
    function send() {
        let txt = document.getElementById('msg').value;
        if(!txt) return;
        db.groups[activeG].msgs.push(cur + ": " + txt);
        document.getElementById('msg').value = '';
        localStorage.setItem('art_db', JSON.stringify(db));
        chat();
    }
    function chat() {
        document.getElementById('chat-msgs').innerHTML = db.groups[activeG].msgs.map(m => `<div>${m}</div>`).join('');
    }
</script>
</body>
</html>
