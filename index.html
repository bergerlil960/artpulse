<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art | Share & Create</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; --accent: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- AUTH SYSTEM --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 12px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }

        /* --- NAVIGATION --- */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 500; }
        .active { background: var(--primary) !important; color: white !important; }

        /* --- CONTENT --- */
        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; }
        .active-page { display: block; }

        /* --- PROFILE PFP STYLES --- */
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; cursor: pointer; group; }
        #pfp-display { width: 100%; height: 100%; background: #e2e8f0; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .pfp-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 50%; opacity: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; transition: 0.3s; }
        .pfp-container:hover .pfp-overlay { opacity: 1; }

        /* --- ART GRID --- */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-img { height: 250px; background-size: cover; background-position: center; }
        .card-info { padding: 15px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1 id="auth-title">Welcome</h1>
        <input type="text" id="user-in" class="auth-input" placeholder="Username">
        <input type="password" id="pass-in" class="auth-input" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Enter Art Hub</button>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 15px;">New? Just enter a new name to sign up.</p>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" onclick="show('home', this)">Home</div>
    <div class="nav-item" onclick="show('profile', this)">Profile</div>
    <div class="nav-item" style="color:#ef4444; margin-top:auto" onclick="logout()">Logout</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="margin-bottom:30px;">
            <button class="btn" style="width:auto" onclick="document.getElementById('artFile').click()">+ Upload Art</button>
            <input type="file" id="artFile" hidden accept="image/*" onchange="handleImageUpload(this, 'post')">
        </div>
        <div class="art-grid" id="main-feed"></div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center; margin-bottom:30px;">
            <div class="pfp-container" onclick="document.getElementById('pfpFile').click()">
                <div id="pfp-display">👤</div>
                <div class="pfp-overlay">📷 Change</div>
            </div>
            <input type="file" id="pfpFile" hidden accept="image/*" onchange="handleImageUpload(this, 'pfp')">
            
            <h2 id="profile-name">Artist</h2>
            <p id="profile-bio">Digital Creator</p>
            <button class="btn" style="width:auto; background:#f1f5f9; color:#1e293b" onclick="editBio()">Edit Bio</button>
        </div>
        <h3>My Showcase</h3>
        <div class="art-grid" id="user-gallery"></div>
    </section>
</main>

<script>
    let currentUser = localStorage.getItem('art_active_user');
    let db = JSON.parse(localStorage.getItem('art_local_db')) || { users: {}, posts: [] };

    window.onload = () => {
        if(currentUser) {
            document.getElementById('auth-overlay').style.display = 'none';
            refreshUI();
        }
    };

    function handleAuth() {
        const u = document.getElementById('user-in').value.trim();
        const p = document.getElementById('pass-in').value.trim();
        if(!u || !p) return alert("Fill fields");

        if(!db.users[u]) db.users[u] = { password: p, bio: "Digital Artist", pfp: "" };
        else if(db.users[u].password !== p) return alert("Wrong password");

        currentUser = u;
        localStorage.setItem('art_active_user', u);
        document.getElementById('auth-overlay').style.display = 'none';
        refreshUI();
    }

    function handleImageUpload(input, type) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                // Compress image to keep storage from filling up
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSide = type === 'pfp' ? 300 : 800;
                let w = img.width; let h = img.height;
                if (w > h) { if (w > maxSide) { h *= maxSide / w; w = maxSide; } }
                else { if (h > maxSide) { w *= maxSide / h; h = maxSide; } }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                const optimizedData = canvas.toDataURL('image/jpeg', 0.7);

                if (type === 'pfp') {
                    db.users[currentUser].pfp = optimizedData;
                } else {
                    db.posts.push({ img: optimizedData, author: currentUser, likes: 0 });
                }
                save();
                refreshUI();
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function refreshUI() {
        // Update Profile Tab
        document.getElementById('profile-name').innerText = currentUser;
        document.getElementById('profile-bio').innerText = db.users[currentUser].bio;
        const pfpDisplay = document.getElementById('pfp-display');
        if(db.users[currentUser].pfp) {
            pfpDisplay.style.backgroundImage = `url(${db.users[currentUser].pfp})`;
            pfpDisplay.innerText = "";
        }

        // Update Feed & Gallery
        const feed = document.getElementById('main-feed');
        const gal = document.getElementById('user-gallery');
        feed.innerHTML = gal.innerHTML = '';

        db.posts.forEach((post, i) => {
            const card = `<div class="card">
                <div class="card-img" style="background-image:url(${post.img})"></div>
                <div class="card-info">
                    <strong>@${post.author}</strong>
                    <button onclick="like(${i})" style="float:right; border:none; background:none; cursor:pointer;">❤️ ${post.likes}</button>
                </div>
            </div>`;
            feed.innerHTML += card;
            if(post.author === currentUser) gal.innerHTML += card;
        });
    }

    function editBio() {
        const b = prompt("New Bio:", db.users[currentUser].bio);
        if(b !== null) { db.users[currentUser].bio = b; save(); refreshUI(); }
    }

    function like(i) { db.posts[i].likes++; save(); refreshUI(); }
    function save() { localStorage.setItem('art_local_db', JSON.stringify(db)); }
    function logout() { localStorage.removeItem('art_active_user'); location.reload(); }
    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }
</script>
</body>
</html>
