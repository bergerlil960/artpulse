<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Creator Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- NAVIGATION --- */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.2s; color: #64748b; }
        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .active { background: var(--primary) !important; color: white !important; }

        /* --- LAYOUT --- */
        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #e2e8f0; color: #475569; }

        /* --- ART & VIDEO GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-media { height: 220px; background-size: cover; background-position: center; background-color: #000; position: relative; }
        .card-info { padding: 15px; font-weight: 600; border-top: 1px solid #f1f5f9; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- AUTH --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #e2e8f0; outline: none; box-sizing: border-box; }

        /* --- PROFILE --- */
        #pfp-circle { width: 120px; height: 120px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 20px; background-size: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="logo">Art Hub</div>
        <input type="text" id="u-in" class="input" placeholder="Username">
        <input type="password" id="p-in" class="input" placeholder="Password">
        <button class="btn" style="width:100%" onclick="login()">Sign In / Create Account</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" id="nav-home" onclick="show('home', this)">Home</div>
    <div class="nav-item" onclick="show('groups', this)">Groups</div>
    <div class="nav-item" onclick="show('learn', this)">Learn</div>
    <div class="nav-item" onclick="show('profile', this)">Profile</div>
    <div class="nav-item" style="color:#ef4444; margin-top:auto" onclick="logout()">Logout</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h2>Community Gallery</h2>
            <button class="btn" onclick="document.getElementById('art-up').click()">+ Post Art</button>
            <input type="file" id="art-up" hidden accept="image/*" onchange="handleUpload(this, 'art')">
        </div>
        <div class="grid" id="home-feed"></div>
    </section>

    <section id="groups" class="page">
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <button class="btn" onclick="createGroup()">Create New Group</button>
            <button class="btn btn-secondary" onclick="joinGroup()">Join with Code</button>
        </div>
        <h3>Your Groups</h3>
        <div class="grid" id="group-list"></div>
    </section>

    <section id="learn" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h2>Tutorials</h2>
            <button class="btn" onclick="document.getElementById('vid-up').click()">+ Upload Lesson</button>
            <input type="file" id="vid-up" hidden accept="video/*" onchange="handleUpload(this, 'video')">
        </div>
        <div class="grid" id="learn-feed"></div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:40px; border-radius:24px; text-align:center;">
            <div id="pfp-circle" onclick="document.getElementById('pfp-up').click()">👤</div>
            <input type="file" id="pfp-up" hidden accept="image/*" onchange="handleUpload(this, 'pfp')">
            <h2 id="p-name">Artist Name</h2>
            <p id="p-bio">Click to edit bio</p>
            <button class="btn btn-secondary" onclick="editProfile()">Edit Profile</button>
        </div>
        <h3 style="margin-top:40px;">My Creations</h3>
        <div class="grid" id="user-gallery"></div>
    </section>
</main>

<script>
    let user = localStorage.getItem('art_user');
    let db = JSON.parse(localStorage.getItem('art_global_db')) || { users: {}, posts: [], videos: [], groups: [] };

    window.onload = () => {
        if(user) { document.getElementById('auth-overlay').style.display='none'; render(); }
        show('home', document.getElementById('nav-home')); // Always go home on refresh
    };

    function login() {
        const u = document.getElementById('u-in').value.trim();
        const p = document.getElementById('p-in').value.trim();
        if(!u || !p) return;
        if(!db.users[u]) db.users[u] = { pass: p, bio: "Digital Creator", pfp: "" };
        user = u; localStorage.setItem('art_user', u);
        document.getElementById('auth-overlay').style.display='none';
        save(); render();
    }

    // FIXING THE UPLOAD GLITCH: Compression Logic
    function handleUpload(input, type) {
        const file = input.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            if(type === 'video') {
                // Videos are large, so we store a reference (simulation)
                db.videos.unshift({ src: e.target.result, author: user, title: "New Tutorial" });
                save(); render();
            } else {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = type === 'pfp' ? 200 : 800;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const data = canvas.toDataURL('image/jpeg', 0.7);

                    if(type === 'pfp') db.users[user].pfp = data;
                    else db.posts.unshift({ img: data, author: user });
                    save(); render();
                };
            }
        };
        reader.readAsDataURL(file);
    }

    function render() {
        if(!user) return;
        document.getElementById('p-name').innerText = user;
        document.getElementById('p-bio').innerText = db.users[user].bio;
        if(db.users[user].pfp) {
            document.getElementById('pfp-circle').style.backgroundImage = `url(${db.users[user].pfp})`;
            document.getElementById('pfp-circle').innerText = "";
        }

        const hFeed = document.getElementById('home-feed');
        const lFeed = document.getElementById('learn-feed');
        const uGal = document.getElementById('user-gallery');
        const gList = document.getElementById('group-list');
        
        hFeed.innerHTML = lFeed.innerHTML = uGal.innerHTML = gList.innerHTML = '';

        // Render Art
        db.posts.forEach(p => {
            const card = `<div class="card"><div class="card-media" style="background-image:url(${p.img})"></div><div class="card-info">@${p.author}</div></div>`;
            hFeed.innerHTML += card;
            if(p.author === user) uGal.innerHTML += card;
        });

        // Render Videos
        db.videos.forEach(v => {
            lFeed.innerHTML += `<div class="card">
                <div class="card-media"><video src="${v.src}" controls></video></div>
                <div class="card-info">${v.title} - by @${v.author}</div>
            </div>`;
        });

        // Render Groups
        db.groups.forEach(g => {
            gList.innerHTML += `<div class="card" style="padding:20px; background:var(--primary); color:white; cursor:pointer;" onclick="alert('Entering ${g.name}')">
                <h3>${g.name}</h3>
                <p>Code: ${g.code}</p>
            </div>`;
        });
    }

    function createGroup() {
        const name = prompt("Group Name:");
        if(!name) return;
        const code = Math.floor(1000 + Math.random() * 9000);
        db.groups.push({ name, code, members: [user] });
        save(); render();
        alert("Group Created! Share this code: " + code);
    }

    function joinGroup() {
        const code = prompt("Enter 4-digit code:");
        const g = db.groups.find(x => x.code == code);
        if(g) alert("Joined " + g.name); else alert("Group not found.");
    }

    function save() { 
        try { localStorage.setItem('art_global_db', JSON.stringify(db)); }
        catch(e) { alert("Storage full! Try deleting some old posts."); }
    }

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }

    function editProfile() {
        const b = prompt("New Bio:", db.users[user].bio);
        if(b) { db.users[user].bio = b; save(); render(); }
    }

    function logout() { localStorage.removeItem('art_user'); location.reload(); }
</script>
</body>
</html>
