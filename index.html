<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Public Community Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); min-height: 100vh; }

        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 600; color: #64748b; }
        .active { background: var(--primary) !important; color: white !important; }

        main { margin-left: 240px; padding: 40px; width: 100%; }
        .page { display: none; }
        .active-page { display: block; }

        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { height: 280px; background-size: cover; background-position: center; background-color: #f1f5f9; }
        .card-info { padding: 15px; font-weight: bold; border-top: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 25px; height: 25px; background: #ddd; border-radius: 50%; }

        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="logo">Art Hub</div>
        <p>Enter a name to join the community</p>
        <input type="text" id="user-in" placeholder="Artist Name">
        <button class="btn" style="width:100%" onclick="startApp()">Enter Gallery</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" onclick="show('home', this)">Community Gallery</div>
    <div class="nav-item" onclick="show('profile', this)">My Profile</div>
    <div class="nav-item" style="margin-top:auto; color:#ef4444" onclick="location.reload()">Logout</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Community Feed</h2>
            <button class="btn" onclick="document.getElementById('art-file').click()">+ Share Art</button>
            <input type="file" id="art-file" hidden accept="image/*" onchange="uploadArt(this)">
        </div>
        <div class="art-grid" id="global-feed"></div>
    </section>

    <section id="profile" class="page">
        <h2 id="prof-name">Artist</h2>
        <div class="art-grid" id="my-gallery"></div>
    </section>
</main>

<script>
    // --- 1. FIREBASE SETUP ---
    // PASTE YOUR KEYS FROM FIREBASE CONSOLE HERE:
    const firebaseConfig = {
        apiKey: "PASTE_HERE",
        authDomain: "PASTE_HERE",
        databaseURL: "PASTE_HERE",
        projectId: "PASTE_HERE",
        storageBucket: "PASTE_HERE",
        messagingSenderId: "PASTE_HERE",
        appId: "PASTE_HERE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = "";

    function startApp() {
        currentUser = document.getElementById('user-in').value.trim();
        if(!currentUser) return alert("Please enter a name");
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('prof-name').innerText = currentUser;
        listenToGallery();
    }

    // --- 2. PUBLIC UPLOAD WITH COMPRESSION ---
    function uploadArt(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                // Resize image so it works for everyone instantly
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }
                }

                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const compressedData = canvas.toDataURL('image/jpeg', 0.7);

                // Send to Public Cloud
                db.ref('community_gallery').push({
                    img: compressedData,
                    author: currentUser,
                    timestamp: Date.now()
                });
            };
        };
        reader.readAsDataURL(file);
    }

    // --- 3. PUBLIC REAL-TIME LISTENER ---
    function listenToGallery() {
        db.ref('community_gallery').on('value', (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('global-feed');
            const myGal = document.getElementById('my-gallery');
            feed.innerHTML = myGal.innerHTML = "";
            
            if (data) {
                // Convert to array and sort by newest first
                const posts = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
                
                posts.forEach(post => {
                    const html = `
                    <div class="card">
                        <div class="card-img" style="background-image:url(${post.img})"></div>
                        <div class="card-info">
                            <div class="avatar"></div>
                            <span>@${post.author}</span>
                        </div>
                    </div>`;
                    
                    feed.innerHTML += html;
                    if(post.author === currentUser) myGal.innerHTML += html;
                });
            }
        });
    }

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }
</script>
</body>
</html>
