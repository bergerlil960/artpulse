<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Community Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); min-height: 100vh; }

        /* Sidebar Navigation */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 600; color: #64748b; }
        .active { background: var(--primary) !important; color: white !important; }

        /* Main Content */
        main { margin-left: 240px; padding: 40px; width: 100%; }
        .page { display: none; }
        .active-page { display: block; }

        /* Community Gallery Grid */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card-img { height: 250px; background-size: cover; background-position: center; }
        .card-info { padding: 15px; font-weight: bold; border-top: 1px solid #f1f5f9; }

        /* Buttons & Auth */
        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1>Art Hub</h1>
        <input type="text" id="user-in" placeholder="Your Artist Name">
        <button class="btn" style="width:100%" onclick="startApp()">Enter Gallery</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" onclick="show('home', this)">Community Gallery</div>
    <div class="nav-item" onclick="show('profile', this)">My Profile</div>
    <div class="nav-item" style="margin-top:auto; color:#ef4444" onclick="location.reload()">Logout</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Public Artwork</h2>
            <button class="btn" onclick="document.getElementById('art-file').click()">+ Share to Community</button>
            <input type="file" id="art-file" hidden accept="image/*" onchange="uploadArt(this)">
        </div>
        <div class="art-grid" id="global-feed"></div>
    </section>

    <section id="profile" class="page">
        <h2 id="prof-name">Artist</h2>
        <div class="art-grid" id="my-gallery"></div>
    </section>
</main>

<script>
    // --- 1. FIREBASE SETUP (Paste your keys here) ---
    const firebaseConfig = {
        apiKey: "PASTE_HERE",
        databaseURL: "PASTE_HERE",
        projectId: "PASTE_HERE",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = "";

    function startApp() {
        currentUser = document.getElementById('user-in').value.trim();
        if(!currentUser) return alert("Please enter a name");
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('prof-name').innerText = currentUser;
        
        // Start listening to the cloud database
        listenToGallery();
    }

    // --- 2. THE GLOBAL UPLOAD ---
    function uploadArt(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            // Push to the CLOUD so everyone sees it
            db.ref('community_gallery').push({
                img: e.target.result,
                author: currentUser,
                timestamp: Date.now()
            });
        };
        reader.readAsDataURL(input.files[0]);
    }

    // --- 3. THE GLOBAL LISTENER ---
    function listenToGallery() {
        // This function automatically updates the screen whenever ANYONE uploads
        db.ref('community_gallery').on('value', (snapshot) => {
            const data = snapshot.val();
            const feed = document.getElementById('global-feed');
            const myGal = document.getElementById('my-gallery');
            feed.innerHTML = myGal.innerHTML = "";
            
            if (data) {
                // Reverse items so newest is at the top
                Object.values(data).reverse().forEach(post => {
                    const html = `
                    <div class="card">
                        <div class="card-img" style="background-image:url(${post.img})"></div>
                        <div class="card-info">@${post.author}</div>
                    </div>`;
                    
                    feed.innerHTML += html;
                    if(post.author === currentUser) myGal.innerHTML += html;
                });
            }
        });
    }

    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }
</script>
</body>
</html>
