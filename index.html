<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Hub | Fixed & Functional</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Navigation */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; font-weight: 600; color: #64748b; }
        .active { background: var(--primary) !important; color: white !important; }

        /* Main */
        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; max-width: 1000px; margin: 0 auto; }
        .active-page { display: block; }

        /* Components */
        .btn { background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .card-media { height: 200px; background-size: cover; background-position: center; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Profile */
        #pfp-circle { width: 110px; height: 110px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 15px; background-size: cover; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; }

        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="logo">Art Hub</div>
        <input type="text" id="u-in" placeholder="Username">
        <input type="password" id="p-in" placeholder="Password">
        <button class="btn" style="width:100%" onclick="login()">Enter App</button>
    </div>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active" id="nav-home" onclick="showTab('home', this)">Home</div>
    <div class="nav-item" onclick="showTab('groups', this)">Groups</div>
    <div class="nav-item" onclick="showTab('learn', this)">Learn</div>
    <div class="nav-item" onclick="showTab('profile', this)">Profile</div>
    <div style="margin-top:auto; padding:10px; font-size:0.7rem; color:red; cursor:pointer;" onclick="factoryReset()">⚠️ Reset All Data</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Community Art</h2>
            <button class="btn" onclick="document.getElementById('art-up').click()">+ Upload Art</button>
        </div>
        <input type="file" id="art-up" hidden accept="image/*" onchange="handleFile(this, 'art')">
        <div class="grid" id="home-feed"></div>
    </section>

    <section id="groups" class="page">
        <h2>Studios</h2>
        <button class="btn" onclick="createGroup()">Create Group</button>
        <div class="grid" id="group-feed"></div>
    </section>

    <section id="learn" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Tutorials</h2>
            <button class="btn" onclick="document.getElementById('vid-up').click()">+ Upload Video</button>
        </div>
        <input type="file" id="vid-up" hidden accept="video/*" onchange="handleFile(this, 'video')">
        <div class="grid" id="learn-feed"></div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
            <div id="pfp-circle" onclick="document.getElementById('pfp-up').click()">👤</div>
            <input type="file" id="pfp-up" hidden accept="image/*" onchange="handleFile(this, 'pfp')">
            <h2 id="prof-user">Artist</h2>
            <p id="prof-bio">Digital Artist</p>
            <button class="btn" style="background:#f1f5f9; color:black" onclick="editBio()">Edit Profile</button>
        </div>
        <h3 style="margin-top:30px;">My Gallery</h3>
        <div class="grid" id="my-gallery"></div>
    </section>
</main>

<script>
    let activeUser = localStorage.getItem('art_user');
    // Initialize Database with error catching
    let db;
    try {
        db = JSON.parse(localStorage.getItem('art_db')) || { users: {}, posts: [], videos: [], groups: [] };
    } catch(e) {
        db = { users: {}, posts: [], videos: [], groups: [] };
    }

    window.onload = () => {
        if(activeUser) {
            document.getElementById('auth-overlay').style.display='none';
            renderAll();
        }
    };

    function login() {
        const u = document.getElementById('u-in').value.trim();
        const p = document.getElementById('p-in').value.trim();
        if(!u || !p) return alert("Please enter details");
        if(!db.users[u]) db.users[u] = { pass: p, bio: "Digital Artist", pfp: "" };
        activeUser = u;
        localStorage.setItem('art_user', u);
        document.getElementById('auth-overlay').style.display = 'none';
        saveAndRender();
    }

    // THE FIX: High Compression Image Handler
    function handleFile(input, type) {
        const file = input.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            if(type === 'video') {
                // Video optimization: Store as smaller string if possible
                db.videos.unshift({ src: e.target.result, author: activeUser });
                saveAndRender();
            } else {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = type === 'pfp' ? 150 : 600; // Small size to ensure saving works
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if (h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6); // 60% quality

                    if(type === 'pfp') db.users[activeUser].pfp = compressed;
                    else db.posts.unshift({ img: compressed, author: activeUser });
                    
                    saveAndRender();
                };
            }
        };
        reader.readAsDataURL(file);
    }

    function saveAndRender() {
        try {
            localStorage.setItem('art_db', JSON.stringify(db));
            renderAll();
        } catch(e) {
            alert("Error: Storage is full. Click 'Reset All Data' in the sidebar to fix the buttons.");
        }
    }

    function renderAll() {
        if(!activeUser) return;
        document.getElementById('prof-user').innerText = activeUser;
        document.getElementById('prof-bio').innerText = db.users[activeUser].bio;
        if(db.users[activeUser].pfp) {
            document.getElementById('pfp-circle').style.backgroundImage = `url(${db.users[activeUser].pfp})`;
            document.getElementById('pfp-circle').innerText = "";
        }

        const hFeed = document.getElementById('home-feed');
        const lFeed = document.getElementById('learn-feed');
        const mGal = document.getElementById('my-gallery');
        const gFeed = document.getElementById('group-feed');

        hFeed.innerHTML = lFeed.innerHTML = mGal.innerHTML = gFeed.innerHTML = '';

        db.posts.forEach(p => {
            const html = `<div class="card"><div class="card-media" style="background-image:url(${p.img})"></div><div style="padding:10px"><b>@${p.author}</b></div></div>`;
            hFeed.innerHTML += html;
            if(p.author === activeUser) mGal.innerHTML += html;
        });

        db.videos.forEach(v => {
            lFeed.innerHTML += `<div class="card"><div class="card-media"><video src="${v.src}" controls></video></div><div style="padding:10px"><b>By @${v.author}</b></div></div>`;
        });

        db.groups.forEach(g => {
            gFeed.innerHTML += `<div class="card" style="padding:20px; background:var(--primary); color:white;"><h3>${g.name}</h3><p>Code: ${g.code}</p></div>`;
        });
    }

    function createGroup() {
        const n = prompt("Group Name:");
        if(!n) return;
        db.groups.push({ name: n, code: Math.floor(1000 + Math.random() * 9000) });
        saveAndRender();
    }

    function editBio() {
        const b = prompt("New Bio:", db.users[activeUser].bio);
        if(b) { db.users[activeUser].bio = b; saveAndRender(); }
    }

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }

    function factoryReset() {
        if(confirm("This will fix the buttons but delete your current art. Continue?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
