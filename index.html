<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art | Share Your World</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; --accent: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; text-align: center;
        }
        .auth-card h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.5rem; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* Sidebar */
        nav { width: 240px; height: 100vh; background: var(--sidebar); border-right: 1px solid #e2e8f0; position: fixed; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; letter-spacing: -1.5px; }
        .nav-item { padding: 12px 15px; margin: 4px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; font-weight: 500; }
        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .active-nav { background: var(--primary) !important; color: white !important; }
        .logout { margin-top: auto; color: #ef4444; border: 1px solid #fee2e2; text-align: center; cursor: pointer; padding: 10px; border-radius: 8px;}

        /* Main Content */
        main { margin-left: 240px; padding: 40px; width: calc(100% - 240px); box-sizing: border-box; }
        .page { display: none; max-width: 1000px; margin: 0 auto; }
        .active-page { display: block; }

        /* General Styles */
        .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px;}
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .art-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .art-img { height: 250px; background-size: cover; background-position: center; }
        .card-content { padding: 15px; }
        
        #avatar { width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 15px; background: #ddd; background-size: cover; background-position: center; cursor: pointer; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 3rem;}
        
        #scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 9999; }
        .line { width: 300px; height: 2px; background: var(--accent); position: relative; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 200px; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1>Art</h1>
        <p id="auth-msg">Create an account to start sharing.</p>
        <input type="text" id="auth-user" class="auth-input" placeholder="Username">
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Sign In / Sign Up</button>
    </div>
</div>

<div id="scanner">
    <div style="width:300px; height:200px; border:1px solid var(--accent); position:relative; margin-bottom:20px;">
        <div class="line"></div>
    </div>
    <p>AI SCANNER: VERIFYING ART...</p>
</div>

<nav>
    <div class="logo">Art</div>
    <div class="nav-item active-nav" onclick="showPage('home', this)">Home</div>
    <div class="nav-item" onclick="showPage('groups', this)">Groups</div>
    <div class="nav-item" onclick="showPage('profile', this)">Profile</div>
    <div class="logout" onclick="logout()">Log Out</div>
</nav>

<main>
    <section id="home" class="page active-page">
        <div style="display:flex; gap:10px; margin-bottom:40px;">
            <input type="text" id="search" placeholder="Search artists..." onkeyup="filterArt()">
            <button class="btn" style="width:auto;" onclick="document.getElementById('fileIn').click()">Upload Art</button>
            <input type="file" id="fileIn" hidden accept="image/*" onchange="uploadArt(this)">
        </div>
        <h2>Global Feed</h2>
        <div class="art-grid" id="feed"></div>
    </section>

    <section id="groups" class="page">
        <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #e2e8f0;">
            <h3>Create a Group</h3>
            <input type="text" id="gName" placeholder="Group Name">
            <input type="text" id="gCode" placeholder="4-Digit Code" maxlength="4">
            <button class="btn" onclick="createGroup()">Create</button>
        </div>
        <div id="activeGroup" style="display:none; background:white; padding:20px; border-radius:15px; border:1px solid #e2e8f0;">
            <h2 id="curGName">Group</h2>
            <div id="chatBox" style="height:200px; overflow-y:auto; border:1px solid #eee; padding:10px; margin-bottom:10px;"></div>
            <input type="text" id="chatMsg" placeholder="Message..."><button class="btn" style="width:auto; margin-left:10px;" onclick="sendMsg()">Send</button>
        </div>
    </section>

    <section id="profile" class="page">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:30px;">
            <div id="avatar" onclick="document.getElementById('avatarIn').click()">👤</div>
            <input type="file" id="avatarIn" hidden onchange="uploadAvatar(this)">
            <h2 id="profName">Artist Name</h2>
            <p id="profBio">Art is my pulse.</p>
            <button class="btn btn-sec" style="width:auto;" onclick="editProfile()">Edit Profile</button>
        </div>
        <h3>My Gallery</h3>
        <div class="art-grid" id="myGallery"></div>
    </section>
</main>

<script>
    // Local DB
    let currentUser = localStorage.getItem('art_session');
    let db = JSON.parse(localStorage.getItem('art_db')) || { users: {}, art: [], groups: {} };

    window.onload = () => {
        if(currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
            loadUserData();
        }
        renderArt();
    };

    function handleAuth() {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        if(!user || !pass) return alert("Fill all fields");

        if(!db.users[user]) {
            db.users[user] = { pass: pass, bio: "New Artist", avatar: "" };
            alert("Account Created!");
        } else if(db.users[user].pass !== pass) {
            return alert("Wrong password!");
        }

        currentUser = user;
        localStorage.setItem('art_session', user);
        saveDB();
        document.getElementById('auth-screen').style.display = 'none';
        loadUserData();
    }

    function loadUserData() {
        document.getElementById('profName').innerText = currentUser;
        document.getElementById('profBio').innerText = db.users[currentUser].bio;
        if(db.users[currentUser].avatar) {
            document.getElementById('avatar').style.backgroundImage = `url(${db.users[currentUser].avatar})`;
            document.getElementById('avatar').innerText = "";
        }
    }

    function saveDB() { localStorage.setItem('art_db', JSON.stringify(db)); }

    function logout() {
        localStorage.removeItem('art_session');
        location.reload();
    }

    function uploadArt(input) {
        if (input.files && input.files[0]) {
            document.getElementById('scanner').style.display = 'flex';
            const reader = new FileReader();
            reader.onload = e => {
                setTimeout(() => {
                    document.getElementById('scanner').style.display = 'none';
                    db.art.push({ img: e.target.result, artist: currentUser, likes: 0 });
                    saveDB(); renderArt();
                }, 2000);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function renderArt() {
        const feed = document.getElementById('feed');
        const gallery = document.getElementById('myGallery');
        feed.innerHTML = ''; gallery.innerHTML = '';
        db.art.forEach((a, i) => {
            const html = `<div class="art-card"><div class="art-img" style="background-image:url(${a.img})"></div><div class="card-content"><strong>${a.artist}</strong><br><button onclick="like(${i})">❤️ ${a.likes}</button></div></div>`;
            feed.innerHTML += html;
            if(a.artist === currentUser) gallery.innerHTML += html;
        });
    }

    function like(i) { db.art[i].likes++; saveDB(); renderArt(); }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active-nav');
    }

    function editProfile() {
        const b = prompt("Enter Bio:", db.users[currentUser].bio);
        if(b) { db.users[currentUser].bio = b; document.getElementById('profBio').innerText = b; saveDB(); }
    }

    function uploadAvatar(input) {
        const reader = new FileReader();
        reader.onload = e => {
            db.users[currentUser].avatar = e.target.result;
            document.getElementById('avatar').style.backgroundImage = `url(${e.target.result})`;
            document.getElementById('avatar').innerText = "";
            saveDB();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function createGroup() {
        const n = document.getElementById('gName').value;
        const c = document.getElementById('gCode').value;
        if(n && c) { db.groups[c] = n; saveDB(); alert("Group Created!"); }
    }
</script>
</body>
</html>
