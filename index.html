<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtPulse | Global Art Hub</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text: #1e293b;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg);
            color: var(--text);
        }

        /* Sidebar Navigation */
        nav {
            width: 240px;
            height: 100vh;
            background: var(--sidebar);
            border-right: 1px solid #e2e8f0;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 40px; }

        .nav-item {
            padding: 12px 15px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: 500;
        }

        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .active-nav { background: var(--primary) !important; color: white !important; }

        .logout { margin-top: auto; color: #ef4444; border: 1px solid #fee2e2; text-align: center; }

        /* Main Content */
        main { margin-left: 280px; padding: 40px; width: 100%; }

        .page { display: none; max-width: 1000px; }
        .active-page { display: block; }

        /* Header & Search */
        .search-area {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        input[type="text"], textarea {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            outline: none;
            font-family: inherit;
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        /* Profile Card Styling */
        .profile-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            position: relative;
        }

        #profileAvatar {
            width: 150px;
            height: 150px;
            background: #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .edit-input { display: none; margin-bottom: 10px; width: 80%; }
        .profile-active .edit-input { display: inline-block; }
        .profile-active .profile-text { display: none; }

        /* Scanner Modal */
        #scanner-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }

        .scan-line {
            width: 300px; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            position: relative;
            animation: scan 2s infinite;
        }

        @keyframes scan { 0% { top: 0; } 50% { top: 200px; } 100% { top: 0; } }
        
        /* Art Grid */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .art-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .art-img-preview { height: 250px; background-size: cover; background-position: center; }
    </style>
</head>
<body>

    <div id="scanner-overlay">
        <div style="width: 300px; height: 200px; border: 2px solid var(--accent); position: relative; margin-bottom: 20px;">
            <div class="scan-line"></div>
        </div>
        <p id="scan-label" style="letter-spacing: 2px; font-weight: bold;">AI SCANNER: ANALYZING IMAGE...</p>
    </div>

    <nav>
        <div class="logo">ArtPulse</div>
        <div class="nav-item active-nav" onclick="switchPage('home', this)">Home</div>
        <div class="nav-item" onclick="switchPage('groups', this)">Groups</div>
        <div class="nav-item" onclick="switchPage('profile', this)">Profile</div>
        <div class="nav-item logout" onclick="location.reload()">Log Out</div>
    </nav>

    <main>
        <section id="home" class="page active-page">
            <div class="search-area">
                <input type="text" id="searchBar" placeholder="Search for artists..." onkeyup="filterArt()">
                <button class="upload-btn" onclick="document.getElementById('artInput').click()">+ Upload Art</button>
                <input type="file" id="artInput" hidden accept="image/*" onchange="runScanner(this, 'art')">
            </div>
            <h2>Global Showcase</h2>
            <div class="art-grid" id="mainGallery">
                <div style="text-align: center; color: #94a3b8; grid-column: 1 / -1; padding: 50px;" id="emptyMsg">No art shared yet.</div>
            </div>
        </section>

        <section id="groups" class="page">
            <div id="groupEntry" style="text-align: center; padding: 60px; background: white; border-radius: 20px;">
                <h2>Join a Private Studio</h2>
                <input type="password" id="groupCode" style="font-size: 2rem; width: 200px; text-align: center; letter-spacing: 10px; margin: 20px 0;" maxlength="4" placeholder="0000">
                <br>
                <button class="upload-btn" onclick="validateGroup()">Enter Group</button>
                <p><small>Code: 7777</small></p>
            </div>
            <div id="groupContent" style="display: none;">
                <h2>🎨 Elite Studio Chat</h2>
                <div style="background: white; padding: 20px; height: 350px; border-radius: 15px; border: 1px solid #e2e8f0;">
                    <p><strong>System:</strong> Secure chat active.</p>
                </div>
            </div>
        </section>

        <section id="profile" class="page">
            <div class="profile-card" id="profileCard">
                <div id="profileAvatar">🎨</div>
                
                <h2 class="profile-text" id="displayUsername">Artist Name</h2>
                <p class="profile-text" id="displayBio" style="color: #64748b;">Art is my pulse.</p>
                
                <input type="text" id="editUsername" class="edit-input" placeholder="Username">
                <textarea id="editBio" class="edit-input" placeholder="Bio"></textarea>
                
                <div class="edit-input" style="margin-top: 10px;">
                    <button class="upload-btn" style="background: #94a3b8; font-size: 0.8rem;" onclick="document.getElementById('avatarInput').click()">Change Photo</button>
                    <input type="file" id="avatarInput" hidden accept="image/*" onchange="runScanner(this, 'avatar')">
                </div>

                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">
                
                <button id="editBtn" class="upload-btn" onclick="toggleEditProfile()">Edit Profile</button>
                <button id="saveBtn" class="upload-btn" style="display: none; background: var(--accent);" onclick="saveProfile()">Save Changes</button>
            </div>
        </section>
    </main>

    <script>
        let currentAvatarData = null;

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active-nav');
        }

        function toggleEditProfile() {
            document.getElementById('profileCard').classList.add('profile-active');
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'inline-block';
            document.getElementById('editUsername').value = document.getElementById('displayUsername').innerText;
            document.getElementById('editBio').value = document.getElementById('displayBio').innerText;
        }

        function saveProfile() {
            document.getElementById('displayUsername').innerText = document.getElementById('editUsername').value;
            document.getElementById('displayBio').innerText = document.getElementById('editBio').value;
            document.getElementById('profileCard').classList.remove('profile-active');
            document.getElementById('editBtn').style.display = 'inline-block';
            document.getElementById('saveBtn').style.display = 'none';
        }

        function runScanner(input, type) {
            if (input.files && input.files[0]) {
                const overlay = document.getElementById('scanner-overlay');
                overlay.style.display = 'flex';
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        if (type === 'avatar') {
                            document.getElementById('profileAvatar').style.backgroundImage = `url(${e.target.result})`;
                            document.getElementById('profileAvatar').innerHTML = "";
                            alert("Avatar Verified!");
                        } else {
                            document.getElementById('emptyMsg').style.display = 'none';
                            const gallery = document.getElementById('mainGallery');
                            const card = document.createElement('div');
                            card.className = 'art-card';
                            card.setAttribute('data-artist', document.getElementById('displayUsername').innerText);
                            card.innerHTML = `
                                <div class="art-img-preview" style="background-image: url(${e.target.result})"></div>
                                <div style="padding: 15px;">
                                    <strong>${document.getElementById('displayUsername').innerText}</strong><br>
                                    <small style="color:var(--accent)">Verified Original Art</small>
                                </div>`;
                            gallery.prepend(card);
                        }
                    }, 2500);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function validateGroup() {
            if(document.getElementById('groupCode').value === "7777") {
                document.getElementById('groupEntry').style.display = 'none';
                document.getElementById('groupContent').style.display = 'block';
            } else { alert("Wrong Code!"); }
        }

        function filterArt() {
            let q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.art-card').forEach(c => {
                c.style.display = c.getAttribute('data-artist').toLowerCase().includes(q) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
